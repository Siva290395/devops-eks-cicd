name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin 841162684034.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker Image
      run: |
        docker build -t devops-node-app .

    - name: Tag Image
      run: |
        docker tag devops-node-app:latest 841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest

    - name: Push Image to ECR
      run: |
        docker push 841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest

    - name: Update Kubernetes Deployment
      run: |
        kubectl set image deployment/node-deployment node-app=841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest
