name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 841162684034.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker Image
      run: docker build -t devops-node-app .

    - name: Tag Docker Image
      run: docker tag devops-node-app:latest 841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest

    - name: Push Docker Image
      run: docker push 841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region us-east-1 --name devops-cluster

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/node-deployment node-app=841162684034.dkr.ecr.us-east-1.amazonaws.com/devops-node-app:latest
